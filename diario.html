<!-- diario.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estudantil - Diário</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Estilos específicos para a linha do tempo */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 10px;
            max-height: 400px; /* Define um tamanho fixo */
            overflow-y: auto;  /* Ativa a rolagem vertical */
            padding-right: 5px;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        /* Deixa a barra de rolagem mais fina e elegante */
        .timeline::-webkit-scrollbar {
            width: 6px;
        }
        .timeline::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 10px;
        }

        .bloco-hora {
            display: flex;
            align-items: center;    /* Centraliza a hora verticalmente em relação ao bloco */
            min-height: 60px;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
            padding: 10px 0;        /* Aumentamos um pouco o padding para dar mais respiro */
        }

        .label-hora {
            width: 60px;
            font-size: 0.8rem;
            color: #666;
            font-weight: 500;
            margin-top: 0;          /* Removemos a margem que jogava a hora para baixo */
            text-align: center;
        }

        .conteudo-hora {
            flex: 1;
            min-height: 50px;        /* Garante que a área cinza tenha um tamanho bom */
            background-color: #fcfcfc;
            border-radius: 6px;
            margin-left: 5px;
            border: 1px dashed #eee; /* Uma borda sutil ajuda a visualizar o campo */
        }

        /* Cartão de tarefa que aparecerá sobreposto (Fase 1, item 3) */
        .card-evento {
            background-color: #4a90e2;
            color: white;
            font-size: 0.75rem;
            padding: 5px;
            border-radius: 4px;
            width: 90%;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .btn-adicionar {
            display: block;
            width: 100%;
            background-color: #27ae60;
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="titulo-dia">Dia 00</h1>
            <span id="ano-atual"></span>
        </header>

        <main>
            <a href="javascript:history.back()" class="btn-voltar">← Voltar ao mês</a>
            
            <div class="timeline" id="container-horas">
                <!-- 24 blocos gerados pelo JS -->
            </div>

            <!-- Botão para a última tela (Fase 1, item 4) -->
            <a href="formulario.html" id="link-adicionar" class="btn-adicionar">+ Adicionar Tarefa</a>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
