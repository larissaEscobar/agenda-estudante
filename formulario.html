<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estudantil - Nova Tarefa</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .form-grupo {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
        .btn-salvar {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s;
        }
        .btn-salvar:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nova Tarefa</h1>
            <span id="ano-atual"></span>
        </header>

        <main>
            <a href="javascript:history.back()" class="btn-voltar">← Cancelar</a>
            
        <form id="form-tarefa">
            <div class="form-grupo">
                <label for="titulo">Título da Atividade:</label>
                <input type="text" id="titulo" placeholder="Ex: Prova de Sistemas Operacionais" required>
            </div>

            <div class="form-grupo">
                <label for="local">Local:</label>
                <input type="text" id="local" placeholder="Ex: Laboratório 03 ou Remoto">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-grupo" style="flex: 1;">
                    <label for="hora-inicio">Início:</label>
                    <input type="time" id="hora-inicio" required>
                </div>
                <div class="form-grupo" style="flex: 1;">
                    <label for="hora-fim">Fim:</label>
                    <input type="time" id="hora-fim" required>
                </div>
            </div>

            <div class="form-grupo">
                <label for="observacoes">Observações (Opcional):</label>
                <textarea id="observacoes" rows="3" placeholder="Detalhes adicionais..."></textarea>
            </div>

            <button type="submit" class="btn-salvar">Salvar na Agenda</button>
        </form>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
